# Place this file on the VPS and include it from your main site config.
# Typical path: /etc/nginx/snippets/warranty-wallet-next.conf
#
# Prerequisites:
#   - Express (legacy) on 127.0.0.1:3000
#   - Next.js (Phase 1 marketing) on 127.0.0.1:3001
#
# Apply:
#   sudo cp deploy/nginx/warranty-wallet-next.conf /etc/nginx/snippets/
#   Include inside your server { } block:
#     include /etc/nginx/snippets/warranty-wallet-next.conf;
#   sudo nginx -t && sudo systemctl reload nginx

# --- Upstreams ---
upstream warranty_express {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream warranty_next {
    server 127.0.0.1:3001;
    keepalive 16;
}

# --- API & uploads always stay on Express ---
location /warrantywallet/api/ {
    proxy_pass http://warranty_express/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
}

location /warrantywallet/uploads/ {
    proxy_pass http://warranty_express/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- Next.js static assets ---
location /warrantywallet/_next/ {
    proxy_pass http://warranty_next;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- Phase 1: marketing routes on Next.js ---
location = /warrantywallet {
    return 301 /warrantywallet/;
}

location = /warrantywallet/ {
    proxy_pass http://warranty_next;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ~ ^/warrantywallet/(about|features|faq)/?$ {
    proxy_pass http://warranty_next;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- Legacy SPA fallback (dashboard, myAccount, warranties, etc.) ---
location /warrantywallet/ {
    proxy_pass http://warranty_express;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
}
