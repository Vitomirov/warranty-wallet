# Place this file on the VPS and include it from your main site config.
# Typical path: /etc/nginx/snippets/warranty-wallet-next.conf
#
# Prerequisites:
#   - Express (legacy API + emergency SPA fallback) on 127.0.0.1:3000
#   - Next.js (all pages) on 127.0.0.1:3001
#
# Apply:
#   sudo cp deploy/nginx/warranty-wallet-next.conf /etc/nginx/snippets/
#   Include inside your server { } block:
#     include /etc/nginx/snippets/warranty-wallet-next.conf;
#   sudo nginx -t && sudo systemctl reload nginx

# --- Upstreams ---
upstream warranty_express {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream warranty_next {
    server 127.0.0.1:3001;
    keepalive 16;
}

# Legacy SPA when Next.js is down (internal redirect target only)
location @warranty_express_fallback {
    internal;
    rewrite ^/warrantywallet/?(.*)$ /$1 break;
    proxy_pass http://warranty_express;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
    proxy_cookie_path / /warrantywallet/;
    proxy_redirect off;
}

# --- API & uploads always stay on Express ---
location ^~ /warrantywallet/api/ {
    proxy_pass http://warranty_express/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
}

location ^~ /warrantywallet/uploads/ {
    proxy_pass http://warranty_express/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- Next.js static assets ---
location ^~ /warrantywallet/_next/ {
    proxy_pass http://warranty_next;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# /warrantywallet without slash → proxy to Next (do NOT 301 — loops with Next trailingSlash)
location = /warrantywallet {
    proxy_intercept_errors on;
    error_page 502 503 504 = @warranty_express_fallback;
    proxy_pass http://warranty_next;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# All Warranty Wallet pages → Next.js (legacy fallback on 502/503/504)
location /warrantywallet/ {
    proxy_intercept_errors on;
    error_page 502 503 504 = @warranty_express_fallback;
    proxy_pass http://warranty_next;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
