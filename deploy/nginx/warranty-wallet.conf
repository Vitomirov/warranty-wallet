# /etc/nginx/sites-available/warranty-wallet.conf
# Warranty Wallet strangler routing:
#   Next.js  :3001 → /, /about, /features, /faq, /login, /signup (marketing + auth)
#   Express  :3000 → /api, /uploads, /dashboard, etc. (legacy)
#
# Auto-fallback: if Next returns 502/503/504, nginx serves legacy Vite SPA from Express
# (same UI). See @warranty_express_fallback and proxy_intercept_errors on Next locations.
#
# Portfolio block at the bottom is UNCHANGED — do not modify location /

# 1. HTTP Redirect (Port 80)
server {
    listen 80;
    server_name
        dejanvitomirov.com www.dejanvitomirov.com
        devitowarranty.xyz www.devitowarranty.xyz
        portfolio.devitowarranty.xyz;

    if ($host = "portfolio.devitowarranty.xyz") {
        return 301 https://dejanvitomirov.com;
    }

    if ($host ~* ^(www\.)?devitowarranty\.xyz$) {
        return 301 https://dejanvitomirov.com/warrantywallet/;
    }

    return 301 https://dejanvitomirov.com$request_uri;
}

# 2. HTTPS (Port 443)
server {
    listen 443 ssl;
    server_name
        dejanvitomirov.com www.dejanvitomirov.com
        devitowarranty.xyz www.devitowarranty.xyz
        portfolio.devitowarranty.xyz;

    ssl_certificate /etc/letsencrypt/live/dejanvitomirov.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dejanvitomirov.com/privkey.pem;

    # --- REDIRECTS FOR OLD DOMAINS ---

    if ($host = "portfolio.devitowarranty.xyz") {
        return 301 https://dejanvitomirov.com;
    }

    if ($host ~* ^(www\.)?devitowarranty\.xyz$) {
        return 301 https://dejanvitomirov.com/warrantywallet/;
    }

    # --- WARRANTY WALLET (strangler) ---

    # Legacy SPA when Next.js is down (internal redirect target only)
    location @warranty_express_fallback {
        internal;
        rewrite ^/warrantywallet/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /warrantywallet/;
        proxy_redirect off;
    }

    # API → Express (always)
    location ^~ /warrantywallet/api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Legacy root-level /api/ (keep if used elsewhere)
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PDF uploads → Express
    location ^~ /warrantywallet/uploads/ {
        proxy_pass http://127.0.0.1:3000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js static assets
    location ^~ /warrantywallet/_next/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # /warrantywallet without slash → proxy to Next (do NOT 301 to / slash — that loops with Next 308)
    location = /warrantywallet {
        proxy_intercept_errors on;
        error_page 502 503 504 = @warranty_express_fallback;
        proxy_pass http://127.0.0.1:3001;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Marketing home → Next.js
    location = /warrantywallet/ {
        proxy_intercept_errors on;
        error_page 502 503 504 = @warranty_express_fallback;
        proxy_pass http://127.0.0.1:3001;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Marketing + auth pages → Next.js
    location ~ ^/warrantywallet/(about|features|faq|login|signup)/?$ {
        proxy_intercept_errors on;
        error_page 502 503 504 = @warranty_express_fallback;
        proxy_pass http://127.0.0.1:3001;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Everything else under /warrantywallet/ → legacy Express/Vite
    # (dashboard, myAccount, newWarranty, warranties/*)
    # Trailing slash on proxy_pass STRIPS /warrantywallet/ so Express serves
    # its SPA + assets from root (matches the Vite base path setup).
    location /warrantywallet/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /warrantywallet/;
        proxy_redirect off;
    }

    # --- PORTFOLIO (unchanged) ---
    location / {
        root /var/www/portfolio;
        index index.html;
        try_files $uri $uri/ /index.html;
        include /etc/nginx/mime.types;
    }
}
