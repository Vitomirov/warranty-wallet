# EMERGENCY: Express-only — use when Next is down to restore the site immediately.
# Copy to VPS: /etc/nginx/sites-available/warranty-wallet.conf
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name
        dejanvitomirov.com www.dejanvitomirov.com
        devitowarranty.xyz www.devitowarranty.xyz
        portfolio.devitowarranty.xyz;

    if ($host = "portfolio.devitowarranty.xyz") {
        return 301 https://dejanvitomirov.com;
    }
    if ($host ~* ^(www\.)?devitowarranty\.xyz$) {
        return 301 https://dejanvitomirov.com/warrantywallet/;
    }
    return 301 https://dejanvitomirov.com$request_uri;
}

server {
    listen 443 ssl;
    server_name
        dejanvitomirov.com www.dejanvitomirov.com
        devitowarranty.xyz www.devitowarranty.xyz
        portfolio.devitowarranty.xyz;

    ssl_certificate /etc/letsencrypt/live/dejanvitomirov.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dejanvitomirov.com/privkey.pem;

    if ($host = "portfolio.devitowarranty.xyz") {
        return 301 https://dejanvitomirov.com;
    }
    if ($host ~* ^(www\.)?devitowarranty\.xyz$) {
        return 301 https://dejanvitomirov.com/warrantywallet/;
    }

    # All warranty traffic → Express (legacy Vite SPA) — NO Next.js
    location ^~ /warrantywallet/api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /warrantywallet/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /warrantywallet/;
    }

    location = /warrantywallet {
        return 301 $scheme://$host/warrantywallet/;
    }

    location / {
        root /var/www/portfolio;
        index index.html;
        try_files $uri $uri/ /index.html;
        include /etc/nginx/mime.types;
    }
}
