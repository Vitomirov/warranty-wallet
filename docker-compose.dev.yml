services:
  mysql:
    image: mysql:8.0
    container_name: warranty_db_dev
    restart: always
    env_file:
      - ./.env.development
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./db_init:/docker-entrypoint-initdb.d
    networks:
      - warranty_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.dev
    container_name: warranty_backend_dev
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./.env.development
    volumes:
      - ./src/backend:/app
      - /app/node_modules # Sprecava mapiranje host 'node_modules' foldera
      - ./src/backend/uploads:/app/uploads
      - ./.env.development:/app/.env
    ports:
      - "3000:3000"
    networks:
      - warranty_network

  next:
    image: node:22-slim
    container_name: warranty_next_dev
    restart: unless-stopped
    depends_on:
      - backend
    working_dir: /app/src/next
    volumes:
      - ./src/next:/app/src/next
      - next_node_modules:/app/src/next/node_modules
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_BASE_PATH: /warrantywallet
      LEGACY_API_URL: http://backend:3000
    command: sh -c "npm install && npm run dev"
    networks:
      - warranty_network

volumes:
  mysql_data_dev: {}
  next_node_modules: {}

networks:
  warranty_network:
    driver: bridge