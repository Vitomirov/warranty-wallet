name: Deploy warranty-wallet to VPS

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/vitomirov/warranty-wallet-backend
  NEXT_IMAGE: ghcr.io/vitomirov/warranty-wallet-next
  VITE_API_BASE_URL: https://dejanvitomirov.com/warrantywallet

jobs:
  build-and-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (Express + embedded Vite frontend)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/backend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Next.js (all pages)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/next/Dockerfile
          push: true
          tags: |
            ${{ env.NEXT_IMAGE }}:latest
            ${{ env.NEXT_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS (pull-only, no build)
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.CICD_DEPLOY_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 206.189.59.75 >> ~/.ssh/known_hosts

      - name: Deploy on VPS (pull pre-built images, no build)
        run: |
          ssh root@206.189.59.75 << EOF
            set -e
            cd /home/root/projects/warranty-wallet

            # Recreate .env.production
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > .env.production
            echo "REFRESH_SECRET_KEY=${{ secrets.REFRESH_SECRET_KEY }}" >> .env.production
            echo "MAILGUN_SMTP_HOST=${{ secrets.MAILGUN_SMTP_HOST }}" >> .env.production
            echo "MAILGUN_SMTP_PORT=${{ secrets.MAILGUN_SMTP_PORT }}" >> .env.production
            echo "MAILGUN_SMTP_USER=${{ secrets.MAILGUN_SMTP_USER }}" >> .env.production
            echo "MAILGUN_SMTP_PASSWORD=${{ secrets.MAILGUN_SMTP_PASSWORD }}" >> .env.production
            echo "MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}" >> .env.production
            echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env.production
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env.production
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env.production
            echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env.production
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env.production
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env.production
            echo "PORT=3000" >> .env.production
            echo "NODE_ENV=production" >> .env.production
            echo "VITE_API_BASE_URL=https://dejanvitomirov.com/warrantywallet" >> .env.production
            echo "BACKEND_BASE_URL=https://dejanvitomirov.com/warrantywallet" >> .env.production

            # Pin the exact images built in this run
            echo "BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ github.sha }}" >> .env.production
            echo "NEXT_IMAGE=${{ env.NEXT_IMAGE }}:${{ github.sha }}" >> .env.production

            # Refresh compose file + nginx config + db_init from main
            git fetch --all
            git reset --hard origin/main

            # Keep nginx strangler routing in sync (guarded by config test)
            cp deploy/nginx/warranty-wallet.conf /etc/nginx/sites-available/warranty-wallet.conf
            nginx -t && systemctl reload nginx

            # Authenticate to GHCR so the VPS can pull private images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull pre-built images (NO build on the VPS -> no OOM)
            docker compose --env-file .env.production -f docker-compose.yml pull

            # Recreate containers from the pulled images
            docker compose --env-file .env.production -f docker-compose.yml up -d --no-build

            # Free disk from old images/layers
            docker image prune -f
          EOF
